<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>IPL 2026 Scoreboard</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
<!-- Digital scoreboard font -->
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-font-smoothing:antialiased; }

html, body {
  width:100%; overflow:hidden;
  background:#0a1020;
  font-family:'Poppins', sans-serif;
}

/* ── OUTER BOARD ── */
.board {
  width:100%;
  background: linear-gradient(160deg, #0f1e3d 0%, #0c1a30 50%, #0a1f1a 100%);
  border:1.5px solid rgba(255,255,255,0.08);
  border-radius:14px;
  overflow:hidden;
  position:relative;
}


/* ── TOP HEADER BAR ── */
.header {
  background:rgba(255,255,255,0.04);
  border-bottom:1px solid rgba(255,255,255,0.07);
  padding:8px 14px;
  display:flex;
  align-items:center;
  justify-content:space-between;
}
.header-league {
  font-family:'Poppins', sans-serif;
  font-size:clamp(8px,2.2vw,12px);
  font-weight:700;
  color:rgba(255,255,255,0.45);
  letter-spacing:0.2em;
  text-transform:uppercase;
}
.header-badge {
  display:inline-flex; align-items:center; gap:5px;
}
.live-dot {
  width:7px; height:7px;
  background:#22c55e; border-radius:50%;
  animation:blink 1.4s ease-in-out infinite;
  box-shadow:0 0 6px rgba(34,197,94,0.8);
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.15} }
.live-label {
  font-family:'Poppins', sans-serif;
  font-size:clamp(7px,1.8vw,10px);
  font-weight:700; color:#4ade80;
  letter-spacing:0.15em;
  text-transform:uppercase;
}
.header-match {
  font-family:'Poppins', sans-serif;
  font-size:clamp(7px,1.8vw,10px);
  font-weight:500;
  color:rgba(255,255,255,0.3);
  letter-spacing:0.08em;
}

/* ── MAIN CONTENT AREA ── */
.content-area {
  padding: clamp(10px,3vw,20px) clamp(12px,4vw,24px) clamp(12px,3vw,20px);
}

/* ── STATUS LABEL (LAST MATCH / LIVE) ── */
.status-label {
  text-align:center;
  font-size:clamp(8px,2vw,12px);
  font-weight:700;
  letter-spacing:0.22em;
  text-transform:uppercase;
  color:rgba(255,255,255,0.35);
  margin-bottom:clamp(8px,2.5vw,16px);
}
.status-label.is-live {
  color:#4ade80;
  display:flex; align-items:center; justify-content:center; gap:7px;
}

/* ── SCORE ROW ── */
.score-row {
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  gap:8px;
}

/* ── TEAM BLOCK ── */
.team-block {
  flex:1;
  display:flex; flex-direction:column;
  align-items:center;
  gap:clamp(2px,0.8vw,6px);
}
.t-city {
  font-size:clamp(16px,5.5vw,32px);
  font-weight:900;
  letter-spacing:-0.02em;
  text-transform:uppercase;
  line-height:1;
  text-align:center;
}
.team-block.home .t-city { color:#a3e635; }
.team-block.away .t-city { color:#60a5fa; }

.t-score {
  font-family:'Poppins', sans-serif;
  font-size:clamp(28px,10vw,60px);
  font-weight:900;
  letter-spacing:-0.03em;
  line-height:1;
  font-variant-numeric:tabular-nums;
  text-align:center;
}
.team-block.home .t-score { color: var(--team-color, #c8e84a); }
.team-block.away .t-score { color: var(--team-color, #7cc8ff); }

.t-slash {
  font-family:'Poppins', sans-serif;
  font-size:clamp(11px,2.5vw,16px) !important;
  font-weight:300;
  color:rgba(255,255,255,0.2);
  vertical-align:middle;
  margin:0 1px;
  line-height:1;
}
.t-wkt {
  font-family:'Poppins', sans-serif;
  font-size:clamp(11px,2.5vw,16px) !important;
  font-weight:600;
  color:rgba(255,255,255,0.35);
  vertical-align:middle;
  line-height:1;
}

.t-overs {
  font-size:clamp(9px,2.5vw,14px);
  font-weight:500;
  color:rgba(255,255,255,0.35);
  letter-spacing:0.06em;
  margin-top:2px;
  text-align:center;
  display:block;
}

/* Pre-match: no score, just city */
.t-upcoming {
  font-size:clamp(9px,2.2vw,12px);
  font-weight:600;
  letter-spacing:0.1em;
  color:rgba(255,255,255,0.22);
  text-transform:uppercase;
  margin-top:4px;
}

/* ── CENTRE BLOCK ── */
.centre-block {
  flex-shrink:0;
  width:clamp(70px,19vw,120px);
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  gap:clamp(4px,1.2vw,8px);
  padding-top:clamp(20px,6vw,36px);
}
.c-vs {
  font-size:clamp(9px,2.8vw,15px);
  font-weight:900;
  color:rgba(255,255,255,0.08);
  letter-spacing:0.1em;
}
.c-date {
  font-size:clamp(8px,2.2vw,13px);
  font-weight:600;
  color:rgba(255,255,255,0.4);
  text-align:center;
  line-height:1.4;
  letter-spacing:0.04em;
}
.c-result {
  font-size:clamp(9px,2.4vw,13px);
  font-weight:700;
  color:rgba(255,255,255,0.55);
  text-align:center;
  line-height:1.4;
  margin-top:2px;
}
/* CRR/RRR live */
.c-rates {
  display:flex; flex-direction:column; gap:4px; width:100%;
}
.c-rate-item {
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:6px; padding:3px 6px; text-align:center;
}
.c-rate-lbl {
  font-size:clamp(6px,1.4vw,8px); font-weight:600;
  color:rgba(255,255,255,0.28); letter-spacing:0.14em; text-transform:uppercase;
}
.c-rate-num {
  font-family:'Orbitron', monospace;
  font-size:clamp(11px,3.2vw,16px); font-weight:700; line-height:1.1;
}
.c-rate-num.crr { color:#4ade80; text-shadow:0 0 6px rgba(74,222,128,0.4); }
.c-rate-num.rrr { color:#f87171; text-shadow:0 0 6px rgba(248,113,113,0.4); }
.c-target {
  background:rgba(37,99,235,0.15); border:1px solid rgba(37,99,235,0.3);
  border-radius:6px; padding:3px 8px; text-align:center; width:100%;
}
.c-target-lbl {
  font-size:clamp(6px,1.4vw,8px); font-weight:600;
  color:rgba(255,255,255,0.28); letter-spacing:0.14em; text-transform:uppercase;
}
.c-target-num {
  font-family:'Orbitron', monospace;
  font-size:clamp(13px,3.8vw,20px); font-weight:900;
  color:#f5c842; text-shadow:0 0 8px rgba(245,200,66,0.4); line-height:1.1;
}

/* ── NEXT UP STRIP (matches your screenshot style) ── */
.next-up-strip {
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:5px;
}
.nu-label {
  font-size:clamp(7px,1.8vw,10px);
  font-weight:800;
  letter-spacing:0.2em;
  color:rgba(255,200,50,0.55);
  text-transform:uppercase;
  white-space:nowrap;
}
.nu-divider {
  color:rgba(255,255,255,0.15);
  font-weight:300;
  margin:0 6px;
}
.nu-matches {
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:3px;
  width:100%;
}
.nu-item {
  display:flex;
  align-items:center;
  justify-content:center;
  gap:4px;
  font-size:clamp(9px,2.5vw,13px);
  flex-wrap:wrap;
  text-align:center;
}
.nu-match-num {
  font-weight:600; color:rgba(255,255,255,0.3);
}
.nu-teams {
  font-weight:700; color:rgba(255,255,255,0.75);
}
.nu-teams .sep {
  font-weight:400; color:rgba(255,255,255,0.2); margin:0 3px;
}
.nu-date {
  font-weight:500; color:rgba(255,255,255,0.35);
}

</style>

<script>
// ── TEAM DATA ──
const TEAMS = {

// ── FULL SCHEDULE ──
const SCHEDULE = [

  { date:'Mar 29', matchNo:2,  home:'KKR',  away:'MI',   time:'7:30 PM', venue:'Kolkata'   },

  { date:'Apr 7',  matchNo:13, home:'RR',   away:'MI',   time:'7:30 PM', venue:'Guwahati'  },
  { date:'Apr 8',  matchNo:14, home:'DC',   away:'GT',   time:'7:30 PM', venue:'Delhi'     },
  { date:'Apr 9',  matchNo:15, home:'KKR',  away:'LSG',  time:'7:30 PM', venue:'Kolkata'   },
  { date:'Apr 10', matchNo:16, home:'RR',   away:'RCB',  time:'7:30 PM', venue:'Guwahati'  },
  { date:'Apr 11', matchNo:17, home:'PBKS', away:'SRH',  time:'7:30 PM', venue:'Mullanpur' },
  { date:'Apr 12', matchNo:18, home:'CSK',  away:'DC',   time:'3:30 PM', venue:'Chennai'   },
  { date:'Apr 12', matchNo:19, home:'GT',   away:'MI',   time:'7:30 PM', venue:'Ahmedabad' },
  { date:'Apr 13', matchNo:20, home:'LSG',  away:'RCB',  time:'7:30 PM', venue:'Lucknow'   },
  { date:'Apr 14', matchNo:21, home:'SRH',  away:'KKR',  time:'7:30 PM', venue:'Hyderabad' },
  { date:'Apr 15', matchNo:22, home:'MI',   away:'PBKS', time:'7:30 PM', venue:'Mumbai'    },
  { date:'Apr 16', matchNo:23, home:'RR',   away:'DC',   time:'3:30 PM', venue:'Jaipur'    },
  { date:'Apr 16', matchNo:24, home:'RCB',  away:'GT',   time:'7:30 PM', venue:'Bangalore' },
  { date:'Apr 17', matchNo:25, home:'CSK',  away:'LSG',  time:'7:30 PM', venue:'Chennai'   },
  { date:'Apr 18', matchNo:26, home:'KKR',  away:'GT',   time:'7:30 PM', venue:'Kolkata'   },
  { date:'Apr 19', matchNo:27, home:'PBKS', away:'RR',   time:'3:30 PM', venue:'Mullanpur' },
  { date:'Apr 19', matchNo:28, home:'MI',   away:'SRH',  time:'7:30 PM', venue:'Mumbai'    },
  { date:'Apr 20', matchNo:29, home:'DC',   away:'RCB',  time:'7:30 PM', venue:'Delhi'     },
  { date:'Apr 21', matchNo:30, home:'LSG',  away:'KKR',  time:'7:30 PM', venue:'Lucknow'   },
  { date:'Apr 22', matchNo:31, home:'GT',   away:'CSK',  time:'7:30 PM', venue:'Ahmedabad' },
  { date:'Apr 23', matchNo:32, home:'SRH',  away:'MI',   time:'7:30 PM', venue:'Hyderabad' },
  { date:'Apr 24', matchNo:33, home:'RCB',  away:'PBKS', time:'7:30 PM', venue:'Raipur'    },
  { date:'Apr 25', matchNo:34, home:'RR',   away:'KKR',  time:'7:30 PM', venue:'Jaipur'    },
  { date:'Apr 26', matchNo:35, home:'DC',   away:'LSG',  time:'3:30 PM', venue:'Delhi'     },
  { date:'Apr 26', matchNo:36, home:'CSK',  away:'GT',   time:'7:30 PM', venue:'Chennai'   },
  { date:'Apr 27', matchNo:37, home:'MI',   away:'RCB',  time:'7:30 PM', venue:'Mumbai'    },
  { date:'Apr 28', matchNo:38, home:'SRH',  away:'PBKS', time:'7:30 PM', venue:'Hyderabad' },
  { date:'Apr 29', matchNo:39, home:'KKR',  away:'RR',   time:'7:30 PM', venue:'Kolkata'   },
  { date:'Apr 30', matchNo:40, home:'GT',   away:'DC',   time:'7:30 PM', venue:'Ahmedabad' },
  { date:'May 1',  matchNo:41, home:'LSG',  away:'MI',   time:'7:30 PM', venue:'Lucknow'   },
  { date:'May 2',  matchNo:42, home:'RCB',  away:'SRH',  time:'3:30 PM', venue:'Raipur'    },
  { date:'May 2',  matchNo:43, home:'CSK',  away:'KKR',  time:'7:30 PM', venue:'Chennai'   },
  { date:'May 3',  matchNo:44, home:'PBKS', away:'GT',   time:'7:30 PM', venue:'Mullanpur' },
  { date:'May 4',  matchNo:45, home:'MI',   away:'DC',   time:'7:30 PM', venue:'Mumbai'    },
  { date:'May 5',  matchNo:46, home:'RR',   away:'LSG',  time:'7:30 PM', venue:'Jaipur'    },
];


// ── STATE ──
let state = {
  status: 'upcoming', // 'upcoming' | 'live' | 'complete'
  matchIdx: 0,
  home: { runs:null, wickets:null, overs:null, allOut:false },
  away: { runs:null, wickets:null, overs:null, allOut:false },
  crr: null, rrr: null, result: null, target: null,
};

// Cache for scraped last-match data
let lastMatchData       = null;
let lastMatchFetchedIdx = -1;
let prevMatchIdx        = -1;

const $ = id => document.getElementById(id);

// ── FIND TODAY'S ACTIVE MATCH ──
// On double-header days: show 3:30 PM match until it's finished,
// then switch to 7:30 PM match from 7:00 PM onwards
function todayIdx() {
  const now  = new Date();
  const mon  = now.toLocaleString('en-US', { month:'short' });
  const day  = now.getDate();
  const key  = `${mon} ${day}`;
  const todayMatches = SCHEDULE
    .map((m, i) => ({ ...m, idx: i }))
    .filter(m => m.date === key);

  if (todayMatches.length === 0) {
    // No match today — find next upcoming match
    const upcoming = SCHEDULE.findIndex(m => {
      const [mo, da] = m.date.split(' ');
      const d = new Date(`${mo} ${da} 2026`);
      return d >= new Date(now.getFullYear(), now.getMonth(), now.getDate());
    });
    return upcoming >= 0 ? upcoming : SCHEDULE.length - 1;
  }

  if (todayMatches.length === 1) return todayMatches[0].idx;

  // Double-header: pick the match currently active or next to start
  const nowMins = now.getHours() * 60 + now.getMinutes();
  function toMins(timeStr) {
    const [t, ap] = timeStr.split(' ');
    let [h, mi] = t.split(':').map(Number);
    if (ap === 'PM' && h !== 12) h += 12;
    return h * 60 + mi;
  }
  for (const m of todayMatches) {
    const startMins = toMins(m.time);
    // Show this match from 30 mins before until 3 hours after start
    if (nowMins >= startMins - 30 && nowMins < startMins + 180) return m.idx;
  }
  // Before first match window → show first match (pre-match / T-1 view)
  // After last match window → show last match (finished view)
  const firstStart = toMins(todayMatches[0].time);
  return nowMins < firstStart - 30
    ? todayMatches[0].idx
    : todayMatches[todayMatches.length - 1].idx;
}

// ── HAS MATCH STARTED? ──
function matchHasStarted(m) {
  const now = new Date();
  const [t, ap] = m.time.split(' ');
  let [h, mi]   = t.split(':').map(Number);
  if (ap === 'PM' && h !== 12) h += 12;
  if (ap === 'AM' && h === 12) h = 0;
  const start = new Date(now);
  start.setHours(h, mi - 5, 0, 0); // 5 min early grace
  return now >= start;
}

// ── SCORE DISPLAY HELPERS ──
function splitScore(s) {
  if (!s || s === '—') return `<span class="t-score" style="color:rgba(255,255,255,0.2)">—</span>`;
  const parts = s.split('/');
  if (parts.length === 2) {
    return `<span class="t-score">${parts[0]}</span><span class="t-slash">/</span><span class="t-wkt">${parts[1]}</span>`;
  }
  return `<span class="t-score">${s}</span>`;
}

function scoreHTML(t) {
  if (t.runs === null) return `<div class="t-upcoming">Yet to bat</div>`;
  const wkt = t.allOut ? '10' : String(t.wickets);
  const ov  = t.overs  != null ? `${t.overs} ov` : '';
  return `
    <div style="display:inline-flex;align-items:center;justify-content:center;width:100%;gap:0;">
      <span class="t-score">${t.runs}</span><span class="t-slash">/</span><span class="t-wkt">${wkt}</span>
    </div>
    ${ov ? `<div class="t-overs">${ov}</div>` : ''}`;
}

// ── APPLY TEAM COLOR ──
function applyColor(cityEl, scoreWrapEl, color) {
  cityEl.style.color = color;
  const block = cityEl.closest('.team-block');
  if (block) block.style.setProperty('--team-color', color);
}

function teamColor(code) {
  return (TEAMS[code] && TEAMS[code].color) ? TEAMS[code].color : '#aaaaaa';
}

function colorByCity(cityName) {
  const code = Object.keys(TEAMS).find(k =>
    TEAMS[k].city === cityName || TEAMS[k].short === cityName
  );
  return code ? teamColor(code) : '#aaaaaa';
}

// ── SCRAPE A COMPLETED MATCH ──
async function scrapeMatchData(m) {
  const url = buildCricktrackerUrl(m);
  try {
    const html = await proxyFetch(url);
    if (!html) return null;

    const doc  = new DOMParser().parseFromString(html, 'text/html');
    const full = (doc.querySelector('title')?.textContent || '') + ' ' + (doc.body?.textContent || '');

    const isDone = /won by|match tied|won the match/i.test(full);
    if (!isDone) return null;

    // Extract both innings scores
    const scoreRx = /(\d{1,3})\/(\d{1,2})\s*[\(\[]?\s*(\d+\.?\d*)\s*(?:ov|overs?)/gi;
    const found = []; let mx;
    while ((mx = scoreRx.exec(full)) !== null) {
      found.push({ runs:+mx[1], wickets:+mx[2], overs:parseFloat(mx[3]) });
    }
    if (found.length < 2) return null;

    // Extract result sentence
    const hCity = TEAMS[m.home]?.city || m.home;
    const aCity = TEAMS[m.away]?.city || m.away;
    const pat   = new RegExp(`((?:${hCity}|${aCity}|${m.home}|${m.away})[^.]{0,60}(?:won by|tied)[^.]{0,50})`, 'i');
    const rm    = full.match(pat);
    const result = rm ? rm[0].trim().replace(/\s+/g, ' ') : 'Match Complete';

    // Determine which innings is home vs away
    const awayBatted1st = new RegExp(`${m.away}\\s*\\*|${aCity}[^.]*?bat(?:ted)? first`, 'i').test(full);
    const homeS = awayBatted1st ? found[1] : found[0];
    const awayS = awayBatted1st ? found[0] : found[1];

    return {
      homeCity:  hCity,
      awayCity:  aCity,
      homeScore: `${homeS.runs}/${homeS.wickets}`,
      homeOv:    `${homeS.overs} ov`,
      awayScore: `${awayS.runs}/${awayS.wickets}`,
      awayOv:    `${awayS.overs} ov`,
      result,
      venue:     `${m.venue} · ${m.date}`,
    };
  } catch (e) {
    console.warn('Last match scrape failed:', e.message);
    return null;
  }
}

// ── RENDER ──
function render() {
  const idx = state.matchIdx;
  const m   = SCHEDULE[idx];
  const H   = TEAMS[m.home] || { city:m.home, color:'#aaaaaa' };
  const A   = TEAMS[m.away] || { city:m.away, color:'#aaaaaa' };

  const isPreMatch = state.status === 'upcoming';

  const homeCity = $('homeCity');
  const awayCity = $('awayCity');
  const hSW      = $('homeScoreWrap');
  const aSW      = $('awayScoreWrap');
  const ci       = $('centreInfo');
  const sl       = $('statusLabel');
  const hb       = $('headerBadge');

  // Header right badge
  if (state.status === 'live') {
    hb.innerHTML = `<div class="live-dot"></div><span class="live-label">Live</span>`;
  } else {
    hb.innerHTML = `<span class="header-match">Match ${m.matchNo} · ${m.date}</span>`;
  }

  // ── PRE-MATCH: show last match ──
  if (isPreMatch) {
    sl.className   = 'status-label';
    sl.textContent = 'Last Match';

    const lr = lastMatchData;
    if (lr) {
      homeCity.textContent = lr.homeCity;
      awayCity.textContent = lr.awayCity;
      applyColor(homeCity, hSW, colorByCity(lr.homeCity));
      applyColor(awayCity, aSW, colorByCity(lr.awayCity));
      hSW.innerHTML = `<div style="display:inline-flex;align-items:center;justify-content:center;width:100%;gap:0;">${splitScore(lr.homeScore)}</div>${lr.homeOv ? `<div class="t-overs">${lr.homeOv}</div>` : ''}`;
      aSW.innerHTML = `<div style="display:inline-flex;align-items:center;justify-content:center;width:100%;gap:0;">${splitScore(lr.awayScore)}</div>${lr.awayOv ? `<div class="t-overs">${lr.awayOv}</div>` : ''}`;
      ci.innerHTML  = `<div class="c-date">${lr.venue}</div><div class="c-result">${lr.result}</div>`;
    } else {
      // Last match scrape not ready — show next match info under correct label
      sl.textContent = idx === 0 ? 'Season Opener' : 'Next Match';
      homeCity.textContent = H.city;
      awayCity.textContent = A.city;
      applyColor(homeCity, hSW, teamColor(m.home));
      applyColor(awayCity, aSW, teamColor(m.away));
      hSW.innerHTML = '';
      aSW.innerHTML = '';
      ci.innerHTML  = `<div class="c-date">${m.time} IST<br>${m.date} · ${m.venue}</div>`;
    }
    return;
  }

  // ── LIVE / COMPLETE / STARTED ──
  homeCity.textContent = H.city;
  awayCity.textContent = A.city;
  applyColor(homeCity, hSW, teamColor(m.home));
  applyColor(awayCity, aSW, teamColor(m.away));

  hSW.innerHTML = scoreHTML(state.home);
  aSW.innerHTML = scoreHTML(state.away);

  if (state.status === 'live') {
    sl.className  = 'status-label is-live';
    sl.innerHTML  = `<div class="live-dot"></div> Live`;
    const c = state.crr ? state.crr.toFixed(2) : '—';
    const r = state.rrr ? state.rrr.toFixed(2) : '—';
    let html = '';
    if (state.target) html += `<div class="c-target"><div class="c-target-lbl">Target</div><div class="c-target-num">${state.target}</div></div>`;
    html += `<div class="c-rates"><div class="c-rate-item"><div class="c-rate-lbl">CRR</div><div class="c-rate-num crr">${c}</div></div><div class="c-rate-item"><div class="c-rate-lbl">RRR</div><div class="c-rate-num rrr">${r}</div></div></div>`;
    ci.innerHTML = html;
  } else if (state.status === 'complete') {
    sl.className   = 'status-label';
    sl.textContent = 'Finished';
    ci.innerHTML   = state.result ? `<div class="c-result">${state.result}</div>` : `<div class="c-date">${m.venue}</div>`;
  } else {
    sl.className   = 'status-label';
    sl.textContent = `Match starting soon`;
    ci.innerHTML   = `<div class="c-date">${m.time} IST<br>${m.venue}</div>`;
  }

  $('nextUpStrip').innerHTML = '';
}

// ── PROXY FETCH (tries multiple public CORS proxies in order) ──
async function proxyFetch(url) {
  const proxies = [
    async () => {
      const r = await fetch('https://corsproxy.io/?' + encodeURIComponent(url), { cache:'no-store' });
      if (!r.ok) throw new Error(r.status);
      return r.text();
    },
    async () => {
      const r = await fetch('https://api.allorigins.win/raw?url=' + encodeURIComponent(url), { cache:'no-store' });
      if (!r.ok) throw new Error(r.status);
      return r.text();
    },
    async () => {
      const r = await fetch('https://api.allorigins.win/get?url=' + encodeURIComponent(url), { cache:'no-store' });
      if (!r.ok) throw new Error(r.status);
      const d = await r.json();
      return d.contents || '';
    },
  ];
  for (const tryProxy of proxies) {
    try {
      const html = await tryProxy();
      if (html) return html;
    } catch(e) { /* try next */ }
  }
  return null;
}

// ── LIVE SCORE FETCH ──

function buildCricktrackerUrl(m) {
  // Format: "Apr 2" → "02-apr"
  const months = { Jan:'01',Feb:'02',Mar:'03',Apr:'04',May:'05',Jun:'06',
                   Jul:'07',Aug:'08',Sep:'09',Oct:'10',Nov:'11',Dec:'12' };
  const [mo, da] = m.date.split(' ');
  const dd  = da.padStart(2,'0');
  const mm  = (months[mo] || '00');
  const home = m.home.toLowerCase();
  const away = m.away.toLowerCase();
  return `https://www.crictracker.com/live-scores/${home}-vs-${away}-match-${m.matchNo}-t20-indian-premier-league-${dd}-${mo.toLowerCase()}-2026/`;
}

async function fetchScore() {
  const m = SCHEDULE[state.matchIdx];
  if (!matchHasStarted(m)) return; // don't fetch before match starts

  const url = buildCricktrackerUrl(m);
  try {
    const html = await proxyFetch(url);
    if (!html) return;

    const doc  = new DOMParser().parseFromString(html, 'text/html');
    const full = (doc.querySelector('title')?.textContent || '') + ' ' + (doc.body?.textContent || '');

    const isDone = /won by|match tied|won the match/i.test(full);
    const isLive = !isDone && /\bCRR\b|\bRRR\b|\bPlay Ongoing\b/i.test(full);

    if (isDone) {
      state.status = 'complete';
      // Build pattern using actual team city names
      const hCity = TEAMS[m.home]?.city || m.home;
      const aCity = TEAMS[m.away]?.city || m.away;
      const pat   = new RegExp(`((?:${hCity}|${aCity}|${m.home}|${m.away})[^.]{0,60}(?:won by|tied)[^.]{0,50})`, 'i');
      const rm    = full.match(pat);
      state.result = rm ? rm[0].trim().replace(/\s+/g, ' ') : 'Match Complete';
      return;
    }

    if (isLive) state.status = 'live';

    // ── GENERIC score parsing — works for any match ──
    // Crictracker shows home team first, then away
    const scoreRx = /(\d{1,3})\/(\d{1,2})\s*[\(\[]?\s*(\d+\.?\d*)\s*(?:ov|overs?)/gi;
    const found = []; let mx;
    while ((mx = scoreRx.exec(full)) !== null) {
      found.push({ runs:+mx[1], wickets:+mx[2], overs:parseFloat(mx[3]) });
    }

    // Determine batting team via asterisk marker or "batting" keyword in page
    const homeBatting = new RegExp(`${m.home}\\s*\\*|${TEAMS[m.home]?.city}[^.]*?bat`, 'i').test(full);
    const awayBatting = new RegExp(`${m.away}\\s*\\*|${TEAMS[m.away]?.city}[^.]*?bat`, 'i').test(full);

    if (found.length >= 2) {
      // Two innings visible — assign based on batting context
      if (awayBatting) {
        // Away team batting now = away is 2nd innings
        state.home = { ...found[1], allOut: found[1].wickets >= 10 };
        state.away = { ...found[0], allOut: found[0].wickets >= 10 };
      } else {
        state.home = { ...found[0], allOut: found[0].wickets >= 10 };
        state.away = { ...found[1], allOut: found[1].wickets >= 10 };
      }
    } else if (found.length === 1) {
      const t = { ...found[0], allOut: found[0].wickets >= 10 };
      if (awayBatting) state.away = t;
      else             state.home = t;
    }

    // CRR, RRR, Target
    const crrM = full.match(/CRR\s*[:|]?\s*([\d.]+)/i);
    const rrrM = full.match(/RRR\s*[:|]?\s*([\d.]+)/i);
    const tgtM = full.match(/(?:need|chasing|target\s*of)\s*(\d{2,3})/i);
    if (crrM) state.crr    = parseFloat(crrM[1]);
    if (rrrM) state.rrr    = parseFloat(rrrM[1]);
    if (tgtM) state.target = parseInt(tgtM[1]);

  } catch (e) {
    console.warn('Score fetch failed:', e.message);
  }
}

// ── MAIN LOOP ──
async function tick() {
  const newIdx = todayIdx();

  // Reset live state whenever the active match slot changes
  if (newIdx !== prevMatchIdx) {
    state.status = 'upcoming';
    state.home   = { runs:null, wickets:null, overs:null, allOut:false };
    state.away   = { runs:null, wickets:null, overs:null, allOut:false };
    state.crr    = null; state.rrr = null; state.result = null; state.target = null;
    prevMatchIdx = newIdx;
  }
  state.matchIdx = newIdx;

  // Always try to get live data (no-op before match starts)
  await fetchScore();

  // When not live, ensure T-1 result is scraped and cached
  if (state.status !== 'live' && state.matchIdx > 0 && lastMatchFetchedIdx !== state.matchIdx) {
    const prev = SCHEDULE[state.matchIdx - 1];
    lastMatchData       = await scrapeMatchData(prev);
    lastMatchFetchedIdx = state.matchIdx;
  }

  render();
}

// Set correct matchIdx before the very first render so we never flash Match 1
state.matchIdx = todayIdx();
// Initial render immediately (shows next-match info while T-1 scrape loads)
render();

// Then kick off full tick
tick();

// Adaptive refresh: 30s when live, 2 min otherwise
let refreshInterval = setInterval(async () => {
  await tick();
}, state.status === 'live' ? 30000 : 120000);

// Check every 20s if refresh rate needs to change
setInterval(() => {
  const target = state.status === 'live' ? 30000 : 120000;
  clearInterval(refreshInterval);
  refreshInterval = setInterval(async () => { await tick(); }, target);
}, 20000);
</script>
