<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>IPL 2026 Scoreboard</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
<!-- Digital scoreboard font -->
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-font-smoothing:antialiased; }

html, body {
  width:100%; overflow:hidden;
  background:#0a1020;
  font-family:'Poppins', sans-serif;
}

/* ── OUTER BOARD ── */
.board {
  width:100%;
  background: linear-gradient(160deg, #0f1e3d 0%, #0c1a30 50%, #0a1f1a 100%);
  border:1.5px solid rgba(255,255,255,0.08);
  border-radius:14px;
  overflow:hidden;
  position:relative;
}


/* ── TOP HEADER BAR ── */
.header {
  background:rgba(255,255,255,0.04);
  border-bottom:1px solid rgba(255,255,255,0.07);
  padding:8px 14px;
  display:flex;
  align-items:center;
  justify-content:space-between;
}
.header-league {
  font-family:'Poppins', sans-serif;
  font-size:clamp(8px,2.2vw,12px);
  font-weight:700;
  color:rgba(255,255,255,0.45);
  letter-spacing:0.2em;
  text-transform:uppercase;
}
.header-badge {
  display:inline-flex; align-items:center; gap:5px;
}
.live-dot {
  width:7px; height:7px;
  background:#22c55e; border-radius:50%;
  animation:blink 1.4s ease-in-out infinite;
  box-shadow:0 0 6px rgba(34,197,94,0.8);
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.15} }
.live-label {
  font-family:'Poppins', sans-serif;
  font-size:clamp(7px,1.8vw,10px);
  font-weight:700; color:#4ade80;
  letter-spacing:0.15em;
  text-transform:uppercase;
}
.header-match {
  font-family:'Poppins', sans-serif;
  font-size:clamp(7px,1.8vw,10px);
  font-weight:500;
  color:rgba(255,255,255,0.3);
  letter-spacing:0.08em;
}

/* ── MAIN CONTENT AREA ── */
.content-area {
  padding: clamp(10px,3vw,20px) clamp(12px,4vw,24px) clamp(8px,2.5vw,16px);
}

/* ── STATUS LABEL (LAST MATCH / LIVE) ── */
.status-label {
  text-align:center;
  font-size:clamp(8px,2vw,12px);
  font-weight:700;
  letter-spacing:0.22em;
  text-transform:uppercase;
  color:rgba(255,255,255,0.35);
  margin-bottom:clamp(8px,2.5vw,16px);
}
.status-label.is-live {
  color:#4ade80;
  display:flex; align-items:center; justify-content:center; gap:7px;
}

/* ── SCORE ROW ── */
.score-row {
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  gap:8px;
}

/* ── TEAM BLOCK ── */
.team-block {
  flex:1;
  display:flex; flex-direction:column;
  align-items:center;
  gap:clamp(2px,0.8vw,6px);
}
.t-city {
  font-size:clamp(16px,5.5vw,32px);
  font-weight:900;
  letter-spacing:-0.02em;
  text-transform:uppercase;
  line-height:1;
  text-align:center;
}
.team-block.home .t-city { color:#a3e635; }
.team-block.away .t-city { color:#60a5fa; }

.t-score {
  font-family:'Poppins', sans-serif;
  font-size:clamp(28px,10vw,60px);
  font-weight:900;
  letter-spacing:-0.03em;
  line-height:1;
  font-variant-numeric:tabular-nums;
  text-align:center;
}
.team-block.home .t-score { color:#c8e84a; }
.team-block.away .t-score { color:#7cc8ff; }

.t-wkt {
  font-family:'Poppins', sans-serif;
  font-size:clamp(16px,5.5vw,32px);
  font-weight:700;
  color:rgba(255,255,255,0.35);
}

.t-overs {
  font-size:clamp(9px,2.5vw,14px);
  font-weight:500;
  color:rgba(255,255,255,0.35);
  letter-spacing:0.06em;
  margin-top:2px;
  text-align:center;
  display:block;
}

/* Pre-match: no score, just city */
.t-upcoming {
  font-size:clamp(9px,2.2vw,12px);
  font-weight:600;
  letter-spacing:0.1em;
  color:rgba(255,255,255,0.22);
  text-transform:uppercase;
  margin-top:4px;
}

/* ── CENTRE BLOCK ── */
.centre-block {
  flex-shrink:0;
  width:clamp(70px,19vw,120px);
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  gap:clamp(4px,1.2vw,8px);
  padding-top:clamp(20px,6vw,36px);
}
.c-vs {
  font-size:clamp(9px,2.8vw,15px);
  font-weight:900;
  color:rgba(255,255,255,0.08);
  letter-spacing:0.1em;
}
.c-date {
  font-size:clamp(8px,2.2vw,13px);
  font-weight:600;
  color:rgba(255,255,255,0.4);
  text-align:center;
  line-height:1.4;
  letter-spacing:0.04em;
}
.c-result {
  font-size:clamp(9px,2.4vw,13px);
  font-weight:700;
  color:rgba(255,255,255,0.55);
  text-align:center;
  line-height:1.4;
  margin-top:2px;
}
/* CRR/RRR live */
.c-rates {
  display:flex; flex-direction:column; gap:4px; width:100%;
}
.c-rate-item {
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:6px; padding:3px 6px; text-align:center;
}
.c-rate-lbl {
  font-size:clamp(6px,1.4vw,8px); font-weight:600;
  color:rgba(255,255,255,0.28); letter-spacing:0.14em; text-transform:uppercase;
}
.c-rate-num {
  font-family:'Orbitron', monospace;
  font-size:clamp(11px,3.2vw,16px); font-weight:700; line-height:1.1;
}
.c-rate-num.crr { color:#4ade80; text-shadow:0 0 6px rgba(74,222,128,0.4); }
.c-rate-num.rrr { color:#f87171; text-shadow:0 0 6px rgba(248,113,113,0.4); }
.c-target {
  background:rgba(37,99,235,0.15); border:1px solid rgba(37,99,235,0.3);
  border-radius:6px; padding:3px 8px; text-align:center; width:100%;
}
.c-target-lbl {
  font-size:clamp(6px,1.4vw,8px); font-weight:600;
  color:rgba(255,255,255,0.28); letter-spacing:0.14em; text-transform:uppercase;
}
.c-target-num {
  font-family:'Orbitron', monospace;
  font-size:clamp(13px,3.8vw,20px); font-weight:900;
  color:#f5c842; text-shadow:0 0 8px rgba(245,200,66,0.4); line-height:1.1;
}

/* ── NEXT UP STRIP (matches your screenshot style) ── */
.next-up-strip {
  margin-top:clamp(8px,2.5vw,16px);
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:5px;
}
.nu-label {
  font-size:clamp(7px,1.8vw,10px);
  font-weight:800;
  letter-spacing:0.2em;
  color:rgba(255,200,50,0.55);
  text-transform:uppercase;
  white-space:nowrap;
}
.nu-divider {
  color:rgba(255,255,255,0.15);
  font-weight:300;
  margin:0 6px;
}
.nu-matches {
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:3px;
  width:100%;
}
.nu-item {
  display:flex;
  align-items:center;
  justify-content:center;
  gap:4px;
  font-size:clamp(9px,2.5vw,13px);
  flex-wrap:wrap;
  text-align:center;
}
.nu-match-num {
  font-weight:600; color:rgba(255,255,255,0.3);
}
.nu-teams {
  font-weight:700; color:rgba(255,255,255,0.75);
}
.nu-teams .sep {
  font-weight:400; color:rgba(255,255,255,0.2); margin:0 3px;
}
.nu-date {
  font-weight:500; color:rgba(255,255,255,0.35);
}

</style>
</head>
<body>

<div class="board">

  <!-- Header: title left, match info right -->
  <div class="header">
    <div class="header-league">Indian Premier League 2026</div>
    <div class="header-badge" id="headerBadge"></div>
  </div>

  <!-- Single unified content area -->
  <div class="content-area">

    <!-- Status label: LAST MATCH / LIVE / FINISHED -->
    <div class="status-label" id="statusLabel">Last Match</div>

    <!-- Score row: always visible, content changes per state -->
    <div class="score-row">

      <div class="team-block home">
        <div class="t-city" id="homeCity">Delhi</div>
        <div id="homeScoreWrap">
          <!-- filled by JS -->
        </div>
      </div>

      <div class="centre-block">
        <div class="c-vs">VS</div>
        <div id="centreInfo">
          <!-- filled by JS -->
        </div>
      </div>

      <div class="team-block away">
        <div class="t-city" id="awayCity">Lucknow</div>
        <div id="awayScoreWrap">
          <!-- filled by JS -->
        </div>
      </div>

    </div>

    <!-- Next up strip -->
    <div class="next-up-strip" id="nextUpStrip"></div>

  </div>

</div>

<script>
const TEAMS = {
  LSG:  { city:'Lucknow',   sub:'Super Giants',     short:'Lucknow'   },
  DC:   { city:'Delhi',     sub:'Capitals',          short:'Delhi'     },
  MI:   { city:'Mumbai',    sub:'Indians',           short:'Mumbai'    },

const SCHEDULE = [
  // Phase 1 (confirmed results)
  { date:'Mar 28', matchNo:1,  home:'RCB',  away:'SRH',  time:'7:30 PM', venue:'Bangalore' },
  { date:'Mar 29', matchNo:2,  home:'KKR',  away:'MI',   time:'7:30 PM', venue:'Kolkata'   },
  { date:'Mar 30', matchNo:3,  home:'CSK',  away:'RR',   time:'7:30 PM', venue:'Chennai'   },
  { date:'Apr 1',  matchNo:4,  home:'PBKS', away:'GT',   time:'7:30 PM', venue:'Mullanpur' },
  { date:'Apr 1',  matchNo:5,  home:'LSG',  away:'DC',   time:'7:30 PM', venue:'Lucknow'   },
  // Phase 2
  { date:'Apr 2',  matchNo:6,  home:'KKR',  away:'SRH',  time:'7:30 PM', venue:'Kolkata'   },
  { date:'Apr 3',  matchNo:7,  home:'CSK',  away:'PBKS', time:'7:30 PM', venue:'Chennai'   },
  { date:'Apr 4',  matchNo:8,  home:'DC',   away:'MI',   time:'3:30 PM', venue:'Delhi'     },
  { date:'Apr 4',  matchNo:9,  home:'GT',   away:'RR',   time:'7:30 PM', venue:'Ahmedabad' },
  { date:'Apr 5',  matchNo:10, home:'SRH',  away:'LSG',  time:'7:30 PM', venue:'Hyderabad' },
  { date:'Apr 6',  matchNo:11, home:'RCB',  away:'CSK',  time:'7:30 PM', venue:'Bangalore' },
  { date:'Apr 6',  matchNo:12, home:'KKR',  away:'PBKS', time:'3:30 PM', venue:'Kolkata'   },
  { date:'Apr 7',  matchNo:13, home:'RR',   away:'MI',   time:'7:30 PM', venue:'Guwahati'  },
  { date:'Apr 8',  matchNo:14, home:'DC',   away:'GT',   time:'7:30 PM', venue:'Delhi'     },
  { date:'Apr 9',  matchNo:15, home:'KKR',  away:'LSG',  time:'7:30 PM', venue:'Kolkata'   },
  { date:'Apr 10', matchNo:16, home:'RR',   away:'RCB',  time:'7:30 PM', venue:'Guwahati'  },
  { date:'Apr 11', matchNo:17, home:'PBKS', away:'SRH',  time:'7:30 PM', venue:'Mullanpur' },
  { date:'Apr 12', matchNo:18, home:'CSK',  away:'DC',   time:'3:30 PM', venue:'Chennai'   },
  { date:'Apr 12', matchNo:19, home:'GT',   away:'MI',   time:'7:30 PM', venue:'Ahmedabad' },
  { date:'Apr 13', matchNo:20, home:'LSG',  away:'RCB',  time:'7:30 PM', venue:'Lucknow'   },
  { date:'Apr 14', matchNo:21, home:'SRH',  away:'KKR',  time:'7:30 PM', venue:'Hyderabad' },
  { date:'Apr 15', matchNo:22, home:'MI',   away:'PBKS', time:'7:30 PM', venue:'Mumbai'    },
  { date:'Apr 16', matchNo:23, home:'RCB',  away:'GT',   time:'7:30 PM', venue:'Bangalore' },
  { date:'Apr 16', matchNo:24, home:'RR',   away:'DC',   time:'3:30 PM', venue:'Jaipur'    },
  { date:'Apr 17', matchNo:25, home:'CSK',  away:'LSG',  time:'7:30 PM', venue:'Chennai'   },
  { date:'Apr 18', matchNo:26, home:'KKR',  away:'GT',   time:'7:30 PM', venue:'Kolkata'   },
  { date:'Apr 19', matchNo:27, home:'PBKS', away:'RR',   time:'3:30 PM', venue:'Mullanpur' },
  { date:'Apr 19', matchNo:28, home:'MI',   away:'SRH',  time:'7:30 PM', venue:'Mumbai'    },
  { date:'Apr 20', matchNo:29, home:'DC',   away:'RCB',  time:'7:30 PM', venue:'Delhi'     },
  { date:'Apr 21', matchNo:30, home:'LSG',  away:'KKR',  time:'7:30 PM', venue:'Lucknow'   },
  { date:'Apr 22', matchNo:31, home:'GT',   away:'CSK',  time:'7:30 PM', venue:'Ahmedabad' },
  { date:'Apr 23', matchNo:32, home:'SRH',  away:'MI',   time:'7:30 PM', venue:'Hyderabad' },
  { date:'Apr 24', matchNo:33, home:'RCB',  away:'PBKS', time:'7:30 PM', venue:'Raipur'    },
  { date:'Apr 25', matchNo:34, home:'RR',   away:'KKR',  time:'7:30 PM', venue:'Jaipur'    },
  { date:'Apr 26', matchNo:35, home:'DC',   away:'LSG',  time:'3:30 PM', venue:'Delhi'     },
  { date:'Apr 26', matchNo:36, home:'CSK',  away:'GT',   time:'7:30 PM', venue:'Chennai'   },
  { date:'Apr 27', matchNo:37, home:'MI',   away:'RCB',  time:'7:30 PM', venue:'Mumbai'    },
  { date:'Apr 28', matchNo:38, home:'SRH',  away:'PBKS', time:'7:30 PM', venue:'Hyderabad' },
  { date:'Apr 29', matchNo:39, home:'KKR',  away:'RR',   time:'7:30 PM', venue:'Kolkata'   },
  { date:'Apr 30', matchNo:40, home:'GT',   away:'DC',   time:'7:30 PM', venue:'Ahmedabad' },
  { date:'May 1',  matchNo:41, home:'LSG',  away:'MI',   time:'7:30 PM', venue:'Lucknow'   },
  { date:'May 2',  matchNo:42, home:'RCB',  away:'SRH',  time:'3:30 PM', venue:'Raipur'    },
  { date:'May 2',  matchNo:43, home:'CSK',  away:'KKR',  time:'7:30 PM', venue:'Chennai'   },
  { date:'May 3',  matchNo:44, home:'PBKS', away:'GT',   time:'7:30 PM', venue:'Mullanpur' },
  { date:'May 4',  matchNo:45, home:'MI',   away:'DC',   time:'7:30 PM', venue:'Mumbai'    },
  { date:'May 5',  matchNo:46, home:'RR',   away:'LSG',  time:'7:30 PM', venue:'Jaipur'    },
];

const LAST_RESULTS = {
  // Index in SCHEDULE array → last match result to show before this match starts
  5: { // Before KKR vs SRH (Match 6, Apr 2) — show LSG vs DC result
    homeCity:'Delhi', awayCity:'Lucknow',
    homeScore:'145/4', homeOv:'17.1 ov',
    awayScore:'141/10', awayOv:'18.4 ov',
    result:'Delhi won by 6 wkts',
    venue:'Lucknow · Apr 1'
  },
  6: { // Before CSK vs PBKS (Match 7, Apr 3) — show KKR vs SRH result (TBD tonight)
    homeCity:'Kolkata', awayCity:'Hyderabad',
    homeScore:'—', homeOv:'',
    awayScore:'—', awayOv:'',
    result:'Apr 2 result pending',
    venue:'Kolkata · Apr 2'
  },
  7: { // Before DC vs MI (Match 8, Apr 4)
    homeCity:'Chennai', awayCity:'Punjab',
    homeScore:'—', homeOv:'',
    awayScore:'—', awayOv:'',
    result:'Apr 3 result pending',
    venue:'Chennai · Apr 3'
  },
};

let state = {
  status:'upcoming', matchIdx:4,
  home:{ runs:null, wickets:null, overs:null, allOut:false },
  away:{ runs:null, wickets:null, overs:null, allOut:false },
  crr:null, rrr:null, result:null, target:null,
};

const $ = id => document.getElementById(id);

function todayIdx() {
  const now = new Date();
  const key = `${now.toLocaleString('en-US',{month:'short'})} ${now.getDate()}`;
  // Find last match on today's date (handles double-header days — show the evening match)
  let last = -1;
  for (let i = 0; i < SCHEDULE.length; i++) {
    if (SCHEDULE[i].date === key) last = i;
  }
  return last >= 0 ? last : 5; // default to match 6 (KKR vs SRH, Apr 2)
}

// Check if match has started based on scheduled time
function matchHasStarted(m) {
  const now  = new Date();
  const [time, ampm] = m.time.split(' ');
  let [h, min] = time.split(':').map(Number);
  if (ampm === 'PM' && h !== 12) h += 12;
  if (ampm === 'AM' && h === 12) h = 0;
  const matchStart = new Date(now);
  matchStart.setHours(h, min - 5, 0, 0); // 5 min grace before scheduled time
  return now >= matchStart;
}

function scoreHTML(t) {
  // Returns score number HTML — digital font for numbers only
  if (t.runs === null) return '';
  const wkt = t.allOut ? '/10' : `/${t.wickets}`;
  const ov  = t.overs != null ? `${t.overs} Ov` : '';
  return `
    <div>
      <span class="t-score">${t.runs}</span><span class="t-wkt">${wkt}</span>
    </div>
    ${ov ? `<div class="t-overs">${ov}</div>` : ''}`;
}

function render() {
  const idx = state.matchIdx;
  const m   = SCHEDULE[idx];
  const H   = TEAMS[m.home] || { city:m.home, sub:'', short:m.home };
  const A   = TEAMS[m.away] || { city:m.away, sub:'', short:m.away };

  const isPreMatch = state.status === 'upcoming' && !matchHasStarted(m);

  // Header badge — match info right side
  const hb = $('headerBadge');
  if (state.status === 'live') {
    hb.innerHTML = `<div class="live-dot"></div><span class="live-label">Live</span>`;
  } else {
    hb.innerHTML = `<span class="header-match">Match ${m.matchNo} · ${m.date}</span>`;
  }

  // ── STATUS LABEL ──
  const sl = $('statusLabel');
  if (state.status === 'live') {
    sl.className = 'status-label is-live';
    sl.innerHTML = `<div class="live-dot"></div> Live`;
  } else if (state.status === 'complete') {
    sl.className = 'status-label';
    sl.textContent = 'Finished';
  } else if (isPreMatch) {
    sl.className = 'status-label';
    sl.textContent = 'Last Match';
  } else {
    sl.className = 'status-label';
    sl.textContent = `Starting ${m.time}`;
  }

  // ── TEAM CITIES ──
  // Pre-match: show today's upcoming teams
  // Last-match / live: show relevant teams
  if (isPreMatch) {
    // Show last match teams in score row, today's teams implied by header
    const lr = LAST_RESULTS[idx];
    if (lr) {
      $('homeCity').textContent = lr.homeCity;
      $('awayCity').textContent = lr.awayCity;
      // Scores from last match
      $('homeScoreWrap').innerHTML = `
        <div><span class="t-score">${lr.homeScore}</span></div>
        ${lr.homeOv ? `<div class="t-overs">${lr.homeOv}</div>` : ''}`;
      $('awayScoreWrap').innerHTML = `
        <div><span class="t-score">${lr.awayScore}</span></div>
        ${lr.awayOv ? `<div class="t-overs">${lr.awayOv}</div>` : ''}`;
      // Centre: VS + date/time + result
      $('centreInfo').innerHTML = `
        <div class="c-date">${lr.venue}</div>
        <div class="c-result">${lr.result}</div>`;
    } else {
      // No last result — show upcoming match teams
      $('homeCity').textContent = H.city;
      $('awayCity').textContent = A.city;
      $('homeScoreWrap').innerHTML = `<div class="t-upcoming">${m.time}</div>`;
      $('awayScoreWrap').innerHTML = `<div class="t-upcoming">${m.venue}</div>`;
      $('centreInfo').innerHTML = `<div class="c-date">${m.date}</div>`;
    }
  } else {
    // Live or complete — show today's match scores
    $('homeCity').textContent = H.city;
    $('awayCity').textContent = A.city;
    $('homeScoreWrap').innerHTML = state.home.runs !== null
      ? scoreHTML(state.home)
      : `<div class="t-upcoming">Yet to bat</div>`;
    $('awayScoreWrap').innerHTML = state.away.runs !== null
      ? scoreHTML(state.away)
      : `<div class="t-upcoming">Yet to bat</div>`;

    // Centre info
    if (state.status === 'live') {
      const c = state.crr ? state.crr.toFixed(2) : '—';
      const r = state.rrr ? state.rrr.toFixed(2) : '—';
      let ci = '';
      if (state.target) ci += `<div class="c-target"><div class="c-target-lbl">Target</div><div class="c-target-num">${state.target}</div></div>`;
      ci += `<div class="c-rates">
        <div class="c-rate-item"><div class="c-rate-lbl">CRR</div><div class="c-rate-num crr">${c}</div></div>
        <div class="c-rate-item"><div class="c-rate-lbl">RRR</div><div class="c-rate-num rrr">${r}</div></div>
      </div>`;
      $('centreInfo').innerHTML = ci;
    } else if (state.status === 'complete' && state.result) {
      $('centreInfo').innerHTML = `<div class="c-result">${state.result}</div>`;
    } else {
      $('centreInfo').innerHTML = `<div class="c-date">${m.date}<br>${m.venue}</div>`;
    }
  }

  $('nextUpStrip').innerHTML = '';
}

// ── Live fetch ──
const PROXY = 'https://api.allorigins.win/get?url=';

// Build URL dynamically from today's match
function getScoreUrl(m) {
  const dateStr = m.date.toLowerCase().replace(' ', '-');
  const home    = m.home.toLowerCase();
  const away    = m.away.toLowerCase();
  return `https://www.crictracker.com/live-scores/${home}-vs-${away}-match-${m.matchNo}-t20-indian-premier-league-${dateStr}-2026/`;
}

async function fetchScore() {
  const m = SCHEDULE[state.matchIdx];
  // Don't fetch if match hasn't started yet
  if (!matchHasStarted(m)) return;

  const url = getScoreUrl(m);
  try {
    const r    = await fetch(PROXY + encodeURIComponent(url), { cache:'no-store' });
    const data = await r.json();
    const html = data.contents;
    if (!html) return;
    const doc   = new DOMParser().parseFromString(html, 'text/html');
    const full  = (doc.querySelector('title')?.textContent || '') + ' ' + (doc.body?.textContent || '');

    const isDone = /won by|match tied|won the match/i.test(full);
    const isLive = !isDone && /\bCRR\b|\bRRR\b|\bPlay Ongoing\b/i.test(full);

    if (isDone) {
      state.status = 'complete';
      const homeTeam = TEAMS[m.home]?.city || m.home;
      const awayTeam = TEAMS[m.away]?.city || m.away;
      const pattern  = new RegExp(`((?:${homeTeam}|${awayTeam}|${m.home}|${m.away})[^\\.]{0,70}(?:won by|tied)[^\\.]{0,60})`, 'i');
      const rm = full.match(pattern);
      state.result = rm ? rm[0].trim().replace(/\s+/g,' ') : 'Match Complete';
      return;
    }
    if (isLive) state.status = 'live';

    const rx = /(\d{1,3})\/(\d{1,2})\s*[\(\[]?\s*(\d+\.?\d*)\s*(?:ov|overs?)/gi;
    const found = []; let mx;
    while ((mx = rx.exec(full)) !== null)
      found.push({ runs:+mx[1], wickets:+mx[2], overs:parseFloat(mx[3]) });

    const dcFirst = full.indexOf('DC') < full.indexOf('LSG');
    const dcBats  = /DC\s*\*/i.test(full);

    if (found.length >= 2) {
      if (dcBats || dcFirst) {
        state.away = { ...found[0], allOut: found[0].wickets >= 10 };
        state.home = { ...found[1], allOut: found[1].wickets >= 10 };
      } else {
        state.home = { ...found[0], allOut: found[0].wickets >= 10 };
        state.away = { ...found[1], allOut: found[1].wickets >= 10 };
      }
    } else if (found.length === 1) {
      const lsgBats = /LSG\s*\*/i.test(full);
      const t = { ...found[0], allOut: found[0].wickets >= 10 };
      if (lsgBats) state.home = t; else state.away = t;
    }

    const crrM = full.match(/CRR\s*[:\|]?\s*([\d.]+)/i);
    const rrrM = full.match(/RRR\s*[:\|]?\s*([\d.]+)/i);
    const tgtM = full.match(/(?:need|chasing|target\s*of)\s*(\d{2,3})/i);
    if (crrM) state.crr = parseFloat(crrM[1]);
    if (rrrM) state.rrr = parseFloat(rrrM[1]);
    if (tgtM) state.target = parseInt(tgtM[1]);

  } catch(e) { console.warn('Fetch:', e.message); }
}

async function tick() {
  state.matchIdx = todayIdx();
  await fetchScore();
  render();
}

tick();
let ms = 120_000, timer = setInterval(tick, ms);
setInterval(() => {
  const t = state.status === 'live' ? 30_000 : 120_000;
  if (t !== ms) { clearInterval(timer); ms = t; timer = setInterval(tick, ms); }
}, 15_000);
</script>
</body>
</html>
